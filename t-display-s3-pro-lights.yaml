esphome:
  name: t-display-s3-pro-lights
  friendly_name: "T-Display S3 Pro Lights"
  on_boot:
    priority: -100
    then:
      - script.execute: backlight_wake

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

api:
  encryption:
    key: !secret api_secret

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  min_auth_mode: WPA2

psram:
  mode: octal
  speed: 80MHz

logger:

font:
  - file: "gfonts://Montserrat"
    id: montserrat_28
    size: 28
  - file: "gfonts://Montserrat"
    id: montserrat_20
    size: 20
  - file: "gfonts://Montserrat"
    id: montserrat_18
    size: 18
  - file: "gfonts://Montserrat"
    id: montserrat_14
    size: 14

output:
  - platform: ledc
    pin: 48
    id: backlight_pwm
    frequency: 5000 Hz

light:
  - platform: monochromatic
    output: backlight_pwm
    id: display_backlight
    gamma_correct: 2.2
    name: "Display Backlight"
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

spi:
  clk_pin: 18
  mosi_pin: 17

i2c:
  - scl: 6
    sda: 5
    scan: true
    id: i2c_onboard
    frequency: 100kHz

display:
  - platform: mipi_spi
    model: t-display-s3-pro

touchscreen:
  - platform: cst226
    interrupt_pin: 21
    reset_pin: 13
    on_touch:
      - script.execute: backlight_wake

globals:
  - id: slider_active_lr
    type: bool
    initial_value: "false"
  - id: slider_active_hw
    type: bool
    initial_value: "false"
  - id: slider_active_lr_table
    type: bool
    initial_value: "false"
  - id: backlight_awake
    type: bool
    initial_value: "true"

script:
  # -------- BACKLIGHT CONTROL --------
  - id: backlight_idle_timer
    mode: restart
    then:
      - delay: 30s
      - light.turn_on:
          id: display_backlight
          brightness: 15%
          transition_length: 2s
      - lambda: 'id(backlight_awake) = false;'

  - id: backlight_wake
    mode: restart
    then:
      - light.turn_on:
          id: display_backlight
          brightness: 90%
          transition_length: 0.1s
      - lambda: 'id(backlight_awake) = true;'
      - script.execute: backlight_idle_timer

  # -------- LIGHT CONTROL DEBOUNCING --------
  - id: debounce_lr
    mode: restart
    parameters:
      brightness_val: int
    then:
      - delay: 50ms
      - homeassistant.service:
          service: light.turn_on
          data:
            entity_id: light.yee_group
            brightness: !lambda return brightness_val;

  - id: debounce_lr_table
    mode: restart
    parameters:
      brightness_val: int
    then:
      - delay: 50ms
      - homeassistant.service:
          service: light.turn_on
          data:
            entity_id: light.hallway_dimmer_light
            brightness: !lambda return brightness_val;

  - id: debounce_hw
    mode: restart
    parameters:
      brightness_val: int
    then:
      - delay: 50ms
      - homeassistant.service:
          service: light.turn_on
          data:
            entity_id: light.ledvance_white_hal
            brightness: !lambda return brightness_val;

binary_sensor:
  - platform: homeassistant
    id: lr_light_state
    entity_id: light.yee_group
    on_state:
      - lvgl.button.update:
          id: lr_btn
          state: { checked: !lambda "return x;" }
  
  - platform: homeassistant
    id: hw_light_state
    entity_id: light.ledvance_white_hal
    on_state:
      - lvgl.button.update:
          id: hw_btn
          state: { checked: !lambda "return x;" }

  - platform: homeassistant
    id: lr_table_light_state
    entity_id: light.hallway_dimmer_light
    on_state:
      - lvgl.button.update:
          id: lr_table_btn
          state: { checked: !lambda "return x;" }

sensor:
  - platform: homeassistant
    id: lr_brightness
    entity_id: light.yee_group
    attribute: brightness
    on_value:
      - if:
          condition:
            lambda: 'return !isnan(x) && !id(slider_active_lr);'
          then:
            - lvgl.slider.update:
                id: lr_slider
                value: !lambda "return (int)x;"
            - lvgl.label.update:
                id: lr_pct
                text: !lambda 'return to_string((int)((x / 255.0) * 100.0)) + "%";'

  - platform: homeassistant
    id: hw_brightness
    entity_id: light.ledvance_white_hal
    attribute: brightness
    on_value:
      - if:
          condition:
            lambda: 'return !isnan(x) && !id(slider_active_hw);'
          then:
            - lvgl.slider.update:
                id: hw_slider
                value: !lambda "return (int)x;"
            - lvgl.label.update:
                id: hw_pct
                text: !lambda 'return to_string((int)((x / 255.0) * 100.0)) + "%";'

  - platform: homeassistant
    id: lr_table_brightness
    entity_id: light.hallway_dimmer_light
    attribute: brightness
    on_value:
      - if:
          condition:
            lambda: 'return !isnan(x) && !id(slider_active_lr_table);'
          then:
            - lvgl.slider.update:
                id: lr_table_slider
                value: !lambda "return (int)x;"
            - lvgl.label.update:
                id: lr_table_pct
                text: !lambda 'return to_string((int)((x / 255.0) * 100.0)) + "%";'

  - platform: ltr_als_ps
    address: 0x23
    update_interval: 10s
    ambient_light:
      name: "Ambient Light"
      id: display_ambient_light
      on_value:
        - if:
            condition:
              lambda: 'return x < 50 && id(backlight_awake);'
            then:
              - light.turn_on:
                  id: display_backlight
                  brightness: 40%
            else:
              - if:
                  condition:
                    lambda: 'return id(backlight_awake);'
                  then:
                    - light.turn_on:
                        id: display_backlight
                        brightness: 90%

lvgl:
  pages:
    - id: lights_page
      bg_color: 0xF2F2EE
      widgets:
        # --- LIVING ROOM ---
        - container:
            width: 202
            height: 140
            x: 10
            y: 10
            bg_color: 0xFFFFFF
            radius: 12
            widgets:
              - button:
                  id: lr_btn
                  checkable: true
                  width: 180
                  height: 60
                  align: TOP_MID
                  y: 10
                  on_value:
                    - homeassistant.service:
                        service: !lambda 'return x ? "light.turn_on" : "light.turn_off";'
                        data: { entity_id: light.yee_group }
                  widgets:
                    - label: { text: "Living Room", align: CENTER, text_font: montserrat_20 }
              - slider:
                  id: lr_slider
                  max_value: 255
                  width: 140
                  x: 10
                  y: 95
                  on_press: { lambda: "id(slider_active_lr) = true;" }
                  on_value:
                    - script.execute:
                        id: debounce_lr
                        brightness_val: !lambda "return (int)x;"
                  on_release: { lambda: "id(slider_active_lr) = false;" }
              - label:
                  id: lr_pct
                  text: "0%"
                  x: 155
                  y: 92
                  text_font: montserrat_14

        # --- LR TABLE ---
        - container:
            width: 202
            height: 140
            x: 10
            y: 160
            bg_color: 0xFFFFFF
            radius: 12
            widgets:
              - button:
                  id: lr_table_btn
                  checkable: true
                  width: 180
                  height: 60
                  align: TOP_MID
                  y: 10
                  on_value:
                    - homeassistant.service:
                        service: !lambda 'return x ? "light.turn_on" : "light.turn_off";'
                        data: { entity_id: light.hallway_dimmer_light }
                  widgets:
                    - label: { text: "Front Table", align: CENTER, text_font: montserrat_20 }
              - slider:
                  id: lr_table_slider
                  max_value: 255
                  width: 140
                  x: 10
                  y: 95
                  on_press: { lambda: "id(slider_active_lr_table) = true;" }
                  on_value:
                    - script.execute:
                        id: debounce_lr_table
                        brightness_val: !lambda "return (int)x;"
                  on_release: { lambda: "id(slider_active_lr_table) = false;" }
              - label:
                  id: lr_table_pct
                  text: "0%"
                  x: 155
                  y: 92
                  text_font: montserrat_14

        # --- HALLWAY ---
        - container:
            width: 202
            height: 140
            x: 10
            y: 310
            bg_color: 0xFFFFFF
            radius: 12
            widgets:
              - button:
                  id: hw_btn
                  checkable: true
                  width: 180
                  height: 60
                  align: TOP_MID
                  y: 10
                  on_value:
                    - homeassistant.service:
                        service: !lambda 'return x ? "light.turn_on" : "light.turn_off";'
                        data: { entity_id: light.ledvance_white_hal }
                  widgets:
                    - label: { text: "Hallway", align: CENTER, text_font: montserrat_20 }
              - slider:
                  id: hw_slider
                  max_value: 255
                  width: 140
                  x: 10
                  y: 95
                  on_press: { lambda: "id(slider_active_hw) = true;" }
                  on_value:
                    - script.execute:
                        id: debounce_hw
                        brightness_val: !lambda "return (int)x;"
                  on_release: { lambda: "id(slider_active_hw) = false;" }
              - label:
                  id: hw_pct
                  text: "0%"
                  x: 155
                  y: 92
                  text_font: montserrat_14